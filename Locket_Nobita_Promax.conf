# Shadowrocket Config: Nobita - Locket Gold
# Server: 10 Proxy Tự Động (Auto-Switch)
# Cert: Random (Bảo mật cao - Mỗi máy tự tạo riêng)

[General]
bypass-system = true

[Proxy]
Proxy_01 = HTTP, 23.95.150.145, 6114, umufpmmw, mpuqpela1dgi
Proxy_02 = HTTP, 198.23.239.134, 6540, umufpmmw, mpuqpela1dgi
Proxy_03 = HTTP, 107.172.163.27, 6543, umufpmmw, mpuqpela1dgi
Proxy_04 = HTTP, 216.10.27.159, 6837, umufpmmw, mpuqpela1dgi

[Proxy Group]
# Nobita Auto Select
Nobita_Auto = url-test, Proxy_01, Proxy_02, Proxy_03, Proxy_04, url=http://www.gstatic.com/generate_204, interval=300, tolerance=50

Locket_AppStore = select, Nobita_Auto, DIRECT

[Rule]
DOMAIN-KEYWORD,locket,Locket_AppStore
DOMAIN-SUFFIX,locket.camera,Locket_AppStore
DOMAIN-SUFFIX,revenuecat.com,Locket_AppStore
DOMAIN,api.revenuecat.com,Locket_AppStore

DOMAIN-SUFFIX,apps.apple.com,DIRECT
DOMAIN-SUFFIX,itunes.apple.com,DIRECT
DOMAIN-KEYWORD,iosapps.itunes.apple.com,DIRECT
DOMAIN-KEYWORD,apps.itunes.apple.com,DIRECT

FINAL,DIRECT

[MITM]
# Để trống để bắt buộc tạo chứng chỉ Random trên từng máy
enable = true
hostname = api.revenuecat.com

[Script]
# Nobita Locket Script
revenuecat = type=http-response, pattern=^https:\/\/api\.revenuecat\.com\/.+\/(receipts$|subscribers\/[^/]+$), script-path=https://raw.githubusercontent.com/nobitadev03/Locket_Gold/refs/heads/main/Locket_Gold.js, requires-body=true, max-size=-1, timeout=60, script-update-interval=0

deleteHeader = type=http-request, pattern=^https:\/\/api\.revenuecat\.com\/.+\/(receipts|subscribers), script-path=https://raw.githubusercontent.com/vuong2023/shad/main/js/deleteHeader.js, timeout=60

[Script-Content]
# Ép code chạy ngày 2003
https://raw.githubusercontent.com/nobitadev03/Locket_Gold/refs/heads/main/Locket_Gold.js = const mapping={'%E8%BD%A6%E7%A5%A8%E7%A5%A8':['vip+watch_vip'],'Locket':['Gold']};var ua=$request.headers["User-Agent"]||$request.headers["user-agent"],obj=JSON.parse($response.body);obj.Attention="Chúc mừng bạn! Vui lòng không bán hoặc chia sẻ cho người khác!";var ohoang7={is_sandbox:!1,ownership_type:"PURCHASED",billing_issues_detected_at:null,period_type:"normal",expires_date:"2099-12-18T01:04:17Z",grace_period_expires_date:null,unsubscribe_detected_at:null,original_purchase_date:"2003-07-28T01:04:18Z",purchase_date:"2003-07-28T01:04:17Z",store:"app_store"},vuong2023={grace_period_expires_date:null,purchase_date:"2003-07-28T01:04:17Z",product_identifier:"com.ohoang7.premium.yearly",expires_date:"2099-12-18T01:04:17Z"};const match=Object.keys(mapping).find(e=>ua.includes(e));if(match){let[e,s]=mapping[match];s?(vuong2023.product_identifier=s,obj.subscriber.subscriptions[s]=ohoang7):obj.subscriber.subscriptions["com.ohoang7.premium.yearly"]=ohoang7,obj.subscriber.entitlements[e]=vuong2023}else obj.subscriber.subscriptions["com.ohoang7.premium.yearly"]=ohoang7,obj.subscriber.entitlements.pro=vuong2023;$done({body:JSON.stringify(obj)});